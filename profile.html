<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>愛狗房仲張宏寧</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --accent:    #ef4444;
      --accent2:   #f97316;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --border:    rgba(255,255,255,.08);
      --radius:    1rem;
      --card-r:    1.25rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    /* ── gradient top blob ── */
    body::before {
      content: '';
      position: fixed;
      top: -160px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239,68,68,.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 1rem; }

    /* ═══════════════════════════════
       HERO
    ═══════════════════════════════ */
    .hero {
      padding-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: .75rem;
    }

    .avatar-wrap {
      position: relative;
      width: 110px; height: 110px;
    }
    .avatar-wrap img {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      border: 3px solid var(--surface2);
      box-shadow: 0 0 0 3px rgba(239,68,68,.4), 0 8px 32px rgba(0,0,0,.4);
    }
    .avatar-badge {
      position: absolute;
      bottom: 4px; right: 4px;
      background: var(--accent);
      border: 2px solid var(--bg);
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .hero-name {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: .04em;
      background: linear-gradient(135deg, #fff 30%, #fca5a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-title {
      font-size: .85rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .hero-bio {
      font-size: .92rem;
      color: #cbd5e1;
      line-height: 1.6;
      max-width: 300px;
    }

    /* Social icons row */
    .social-row {
      display: flex;
      gap: .65rem;
      margin-top: .5rem;
    }
    .soc-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all .2s;
      cursor: pointer;
    }
    .soc-btn:hover {
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(239,68,68,.2);
    }

    /* ═══════════════════════════════
       LINE CARD
    ═══════════════════════════════ */
    .line-card {
      margin-top: 1.75rem;
      background: linear-gradient(135deg, #06C755 0%, #00a847 100%);
      border-radius: var(--card-r);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: 0 8px 24px rgba(6,199,85,.25);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .line-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(6,199,85,.35); }

    .line-info { flex: 1; }
    .line-info .tag {
      font-size: .7rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; opacity: .8; margin-bottom: .3rem;
    }
    .line-info .name { font-size: 1.1rem; font-weight: 800; }
    .line-info .sub  { font-size: .8rem; opacity: .85; margin-top: .15rem; }

    .line-qr {
      background: #fff;
      border-radius: .75rem;
      padding: 6px;
      flex-shrink: 0;
    }
    .line-qr img {
      width: 80px; height: 80px;
      display: block;
      object-fit: contain;
    }

    /* ═══════════════════════════════
       SECTION TITLE
    ═══════════════════════════════ */
    .section-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 .75rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-title::before, .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ═══════════════════════════════
       TOOL CARD (計算機)
    ═══════════════════════════════ */
    .tool-card {
      background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
      border-radius: var(--card-r);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: #fff;
      box-shadow: 0 8px 24px rgba(239,68,68,.3);
      transition: transform .2s, box-shadow .2s;
    }
    .tool-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(239,68,68,.45); }
    .tool-icon { font-size: 2.2rem; flex-shrink: 0; }
    .tool-info .t { font-size: 1rem; font-weight: 800; }
    .tool-info .s { font-size: .8rem; opacity: .85; margin-top: .2rem; }

    /* ═══════════════════════════════
       LINK BUTTONS
    ═══════════════════════════════ */
    .link-list { display: flex; flex-direction: column; gap: .65rem; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: .85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .9rem 1.1rem;
      text-decoration: none;
      color: var(--text);
      font-size: .88rem;
      font-weight: 600;
      transition: all .18s;
      cursor: pointer;
    }
    .link-btn:hover {
      background: var(--surface2);
      border-color: rgba(239,68,68,.3);
      transform: translateX(3px);
    }
    .link-btn .ico {
      width: 36px; height: 36px;
      border-radius: .6rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .link-btn .arrow { margin-left: auto; color: var(--muted); font-size: .75rem; }

    /* ═══════════════════════════════
       CONTACT CARD (footer)
    ═══════════════════════════════ */
    .contact-card {
      margin-top: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-r);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .contact-card img.c-photo {
      width: 60px; height: 60px;
      border-radius: .75rem;
      object-fit: cover;
      object-position: top;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .contact-info { flex: 1; }
    .contact-info .badge {
      display: inline-block;
      background: rgba(239,68,68,.15);
      color: #fca5a5;
      font-size: .68rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 99px;
      margin-bottom: .3rem;
    }
    .contact-info .cname { font-size: 1rem; font-weight: 800; }
    .contact-info .csub  { font-size: .78rem; color: var(--muted); margin-top: .15rem; }

    /* ═══════════════════════════════
       FOOTER
    ═══════════════════════════════ */
    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: .72rem;
      color: #475569;
      padding-bottom: 1rem;
    }

    /* ── Pulse animation on LINE card ── */
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 8px 24px rgba(6,199,85,.25); }
      50%       { box-shadow: 0 8px 32px rgba(6,199,85,.5); }
    }
    .line-card { animation: pulse-green 3s ease-in-out infinite; }
    .line-card:hover { animation: none; }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ HERO ══ -->

      </a>
    </div>
  </div>

  <!-- ══ LINE CARD ══ -->
  <div class="line-card" onclick="document.getElementById('line-modal').style.display='flex'">

      <div class="tag">LINE 加好友</div>

    <div class="line-qr">
      <img src="line_QR.png" alt="LINE QR Code" />

  </div>

  <!-- ══ TOOL ══ -->

<!-- ══ LINE QR MODAL ══ -->

     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:999;
            align-items:center; justify-content:center;"
     onclick="this.style.display='none'">
  <div onclick="event.stopPropagation()"
       style="background:#fff; border-radius:1.5rem; padding:2rem; text-align:center; max-width:280px; width:90%; box-shadow:0 24px 64px rgba(0,0,0,.5);">

            style="margin-top:1.25rem; width:100%; padding:.7rem; background:#f1f5f9; border:none; border-radius:.75rem; font-size:.85rem; font-weight:600; cursor:pointer; color:#475569;">
      關閉
    </button>
  </div>
</div>

</body>
